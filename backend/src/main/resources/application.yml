spring:
  profiles:
    include: secret
  datasource:
    url: jdbc:mysql://localhost:3306/freesia?serverTimezone=Asia/Seoul
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

server:
  port: 8080

jwt:
  secret: freesia_project_secret_key_for_testing_purposes_only
  expiration: 86400000

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:5000}
    timeout-ms: 30000 # AI 서버 응답 대기 최대 시간 (ms) — LLM 응답 고려해 30 초로 설정
jackson:
  time-zone: Asia/Seoul

youtube:
  api:
    key: ${YOUTUBE_API_KEY:AIzaSyDIdgHj9NgqnGInLbMYrPMCAvGLU2C_sCg}
    base-url: https://www.googleapis.com/youtube/v3
    max-results: 50
